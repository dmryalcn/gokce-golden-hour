<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
G&Y Admin Panel
</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap"
rel="stylesheet">

<style>

/* =========================================================
   RESET
========================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Inter',sans-serif;

background:#080808;

color:white;

min-height:100vh;

overflow-x:hidden;

padding:30px;

position:relative;

}

/* =========================================================
   BACKGROUND
========================================================= */

body::before{

content:"";

position:fixed;
inset:0;

background:

radial-gradient(
circle at top left,
rgba(212,163,115,.14),
transparent 28%
),

radial-gradient(
circle at bottom right,
rgba(176,137,104,.12),
transparent 30%
);

pointer-events:none;

z-index:-1;

}

/* =========================================================
   LOGIN
========================================================= */

.login-screen{

position:fixed;
inset:0;

background:#050505;

display:flex;

align-items:center;
justify-content:center;

z-index:999999;

padding:20px;

}

.login-box{

width:100%;
max-width:430px;

padding:42px;

border-radius:34px;

background:
rgba(20,20,20,.95);

border:
1px solid rgba(255,255,255,.06);

backdrop-filter:blur(18px);

box-shadow:
0 25px 80px rgba(0,0,0,.6);

}

.logo{

width:92px;
height:92px;

margin:auto;

margin-bottom:28px;

border-radius:50%;

display:flex;

align-items:center;
justify-content:center;

font-size:34px;
font-weight:700;

background:
linear-gradient(
135deg,
#a77745,
#d4a46d
);

box-shadow:
0 12px 35px rgba(212,163,115,.25);

}

.login-box h1{

text-align:center;

font-size:42px;

margin-bottom:10px;

font-family:
"Cormorant Garamond",
serif;

}

.login-box p{

text-align:center;

opacity:.65;

line-height:1.7;

margin-bottom:30px;

}

.login-box input{

width:100%;

padding:18px;

border:none;
outline:none;

border-radius:18px;

background:#171717;

border:
1px solid rgba(255,255,255,.05);

color:white;

font-size:16px;

margin-bottom:18px;

}

.login-box input:focus{

border-color:
rgba(212,163,115,.5);

}

.login-box button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#a77745,
#d4a46d
);

color:white;

font-size:16px;
font-weight:700;

cursor:pointer;

transition:.35s;

}

.login-box button:hover{

transform:
translateY(-2px);

box-shadow:
0 10px 30px rgba(212,163,115,.25);

}

/* =========================================================
   PANEL
========================================================= */

.admin-panel{

display:none;

animation:
fade .5s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:none;
}

}

/* =========================================================
   TOPBAR
========================================================= */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

margin-bottom:34px;

flex-wrap:wrap;

}

.topbar-left h1{

font-size:52px;

font-family:
"Cormorant Garamond",
serif;

margin-bottom:6px;

}

.topbar-left p{

opacity:.62;

}

.logout-btn{

padding:16px 20px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.08);

color:white;

font-weight:600;

cursor:pointer;

transition:.35s;

}

.logout-btn:hover{

background:
rgba(255,255,255,.1);

}

/* =========================================================
   STATS
========================================================= */

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(240px,1fr));

gap:22px;

margin-bottom:34px;

}

.stat-card{

padding:28px;

border-radius:30px;

background:
rgba(20,20,20,.94);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(14px);

}

.stat-card h2{

font-size:14px;

opacity:.62;

margin-bottom:14px;

font-weight:500;

}

.stat-card span{

font-size:48px;

font-weight:700;

}

/* =========================================================
   SECTION
========================================================= */

.panel-section{

background:
rgba(20,20,20,.94);

border:
1px solid rgba(255,255,255,.05);

border-radius:34px;

overflow:hidden;

margin-bottom:34px;

backdrop-filter:blur(14px);

}

/* HEADER */

.section-header{

padding:26px;

display:flex;

justify-content:space-between;

align-items:center;

gap:18px;

flex-wrap:wrap;

border-bottom:
1px solid rgba(255,255,255,.05);

}

.section-title{

font-size:30px;

font-family:
"Cormorant Garamond",
serif;

}

/* =========================================================
   SEARCH
========================================================= */

.search-box{

width:280px;

max-width:100%;

padding:16px 18px;

border:none;
outline:none;

border-radius:18px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.06);

color:white;

}

/* =========================================================
   TABLE
========================================================= */

.table-wrap{

overflow:auto;

}

table{

width:100%;

border-collapse:collapse;

min-width:1000px;

}

thead{

background:#151515;

}

th{

padding:20px;

text-align:left;

font-size:13px;

font-weight:600;

opacity:.68;

}

td{

padding:18px 20px;

border-bottom:
1px solid rgba(255,255,255,.04);

font-size:14px;

line-height:1.6;

}

tr:hover{

background:
rgba(255,255,255,.02);

}

/* =========================================================
   STATUS
========================================================= */

.status{

display:inline-flex;

padding:9px 14px;

border-radius:999px;

font-size:12px;

font-weight:700;

}

.status.yes{

background:
rgba(61,220,151,.14);

color:#3ddc97;

}

.status.no{

background:
rgba(255,107,107,.14);

color:#ff6b6b;

}

.status.maybe{

background:
rgba(255,209,102,.14);

color:#ffd166;

}

/* =========================================================
   BUTTONS
========================================================= */

.action-btn{

padding:11px 16px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:700;

transition:.35s;

}

.action-btn.delete{

background:
rgba(255,80,80,.12);

color:#ff8b8b;

}

.action-btn.delete:hover{

background:
rgba(255,80,80,.22);

transform:
translateY(-2px);

}

.export-btn{

padding:16px 22px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#a77745,
#d4a46d
);

color:white;

font-weight:700;

cursor:pointer;

transition:.35s;

}

.export-btn:hover{

transform:
translateY(-2px);

box-shadow:
0 10px 30px rgba(212,163,115,.25);

}

/* =========================================================
   MEMORY GRID
========================================================= */

.memory-grid{

padding:26px;

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(280px,1fr));

gap:24px;

}

/* CARD */

.memory-card{

background:
rgba(15,15,15,.95);

border:
1px solid rgba(255,255,255,.05);

border-radius:28px;

overflow:hidden;

padding:18px;

}

/* MEDIA */

.memory-card img{

width:100%;

height:240px;

object-fit:cover;

border-radius:18px;

margin-bottom:16px;

}

.memory-card video{

width:100%;

border-radius:18px;

margin-bottom:16px;

}

.memory-card audio{

width:100%;

margin-bottom:16px;

}

/* CONTENT */

.memory-name{

font-size:18px;

font-weight:700;

margin-bottom:10px;

}

.memory-message{

line-height:1.7;

opacity:.76;

margin-bottom:16px;

}

.memory-date{

font-size:13px;

opacity:.45;

margin-bottom:18px;

}

/* =========================================================
   EMPTY
========================================================= */

.empty{

padding:50px;

text-align:center;

opacity:.5;

}

/* =========================================================
   MOBILE
========================================================= */

@media(max-width:768px){

body{
padding:14px;
}

.topbar-left h1{
font-size:40px;
}

.section-title{
font-size:24px;
}

.section-header{
padding:20px;
}

.memory-grid{
padding:18px;
}

.stat-card span{
font-size:38px;
}

table{
min-width:850px;
}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div
class="login-screen"
id="loginScreen">

<div class="login-box">

<div class="logo">
G&Y
</div>

<h1>
Admin Panel
</h1>

<p>
Gökçe & Yalçın davet yönetim sistemi
</p>

<input
type="password"
id="password"
placeholder="Admin şifresi">

<button onclick="login()">

Panele Giriş Yap

</button>

</div>

</div>

<!-- PANEL -->

<div
class="admin-panel"
id="adminPanel">

<!-- TOPBAR -->

<div class="topbar">

<div class="topbar-left">

<h1>
Yönetim Paneli
</h1>

<p>
RSVP & Memory Wall yönetimi
</p>

</div>

<button
class="logout-btn"
onclick="logout()">

Çıkış Yap

</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-card">
<h2>Toplam Başvuru</h2>
<span id="totalCount">0</span>
</div>

<div class="stat-card">
<h2>Katılıyor</h2>
<span id="yesCount">0</span>
</div>

<div class="stat-card">
<h2>Katılmıyor</h2>
<span id="noCount">0</span>
</div>

<div class="stat-card">
<h2>Kararsız</h2>
<span id="maybeCount">0</span>
</div>

</div>

<!-- RSVP -->

<div class="panel-section">

<div class="section-header">

<div class="section-title">
RSVP Yönetimi
</div>

<div style="
display:flex;
gap:14px;
flex-wrap:wrap;
">

<input
type="text"
id="searchInput"
class="search-box"
placeholder="İsim ara...">

<button
class="export-btn"
onclick="exportData()">

CSV İndir

</button>

</div>

</div>

<div class="table-wrap">

<table>

<thead>

<tr>

<th>İsim</th>
<th>Kişi</th>
<th>Durum</th>
<th>Ulaşım</th>
<th>Mesaj</th>
<th>Tarih</th>
<th>İşlem</th>

</tr>

</thead>

<tbody id="guestTable">

<tr>
<td colspan="7" class="empty">
Henüz veri yok
</td>
</tr>

</tbody>

</table>

</div>

</div>

<!-- MEMORY -->

<div class="panel-section">

<div class="section-header">

<div class="section-title">
Anı Galerisi 🤍
</div>

</div>

<div
class="memory-grid"
id="memoryGallery">

</div>

</div>

</div>

<script type="module" src="./admin.js"></script>

</body>

</html>
