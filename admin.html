<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G&Y Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0f0f0f;
color:white;
min-height:100vh;
padding:30px;
}

.login-screen{
position:fixed;
inset:0;
background:#0b0b0b;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.login-box{
width:100%;
max-width:420px;
background:#171717;
padding:40px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.login-box h1{
font-size:32px;
margin-bottom:10px;
}

.login-box p{
opacity:.7;
margin-bottom:30px;
}

.login-box input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:14px;
background:#222;
color:white;
font-size:16px;
margin-bottom:15px;
}

.login-box button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#d4a373,#b08968);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
transform:translateY(-2px);
opacity:.95;
}

.admin-panel{
display:none;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

.topbar h1{
font-size:36px;
}

.logout-btn{
padding:12px 18px;
border:none;
border-radius:12px;
background:#222;
color:white;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#171717;
padding:25px;
border-radius:22px;
border:1px solid rgba(255,255,255,.06);
}

.card h2{
font-size:15px;
opacity:.7;
margin-bottom:10px;
}

.card span{
font-size:38px;
font-weight:700;
}

.table-wrap{
background:#171717;
border-radius:24px;
overflow:hidden;
border:1px solid rgba(255,255,255,.06);
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#1f1f1f;
}

th,td{
padding:18px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.05);
}

th{
font-size:14px;
opacity:.7;
}

tr:hover{
background:rgba(255,255,255,.03);
}

.status{
padding:8px 12px;
border-radius:999px;
font-size:13px;
font-weight:600;
display:inline-block;
}

.status.yes{
background:rgba(0,255,140,.15);
color:#3ddc97;
}

.status.no{
background:rgba(255,80,80,.15);
color:#ff6b6b;
}

.status.maybe{
background:rgba(255,190,70,.15);
color:#ffd166;
}

.export-btn{
margin-top:25px;
padding:14px 20px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#d4a373,#b08968);
color:white;
font-weight:600;
cursor:pointer;
}

@media(max-width:700px){

body{
padding:15px;
}

.topbar{
flex-direction:column;
gap:15px;
align-items:flex-start;
}

.topbar h1{
font-size:28px;
}

th,td{
padding:12px;
font-size:13px;
}

}

</style>
</head>

<body>

<div class="login-screen" id="loginScreen">

<div class="login-box">

<h1>G&Y Admin</h1>

<p>
Yetkili girişi yapın
</p>

<input
type="password"
id="password"
placeholder="Şifre">

<button onclick="login()">
Giriş Yap
</button>

</div>
</div>

<div class="admin-panel" id="adminPanel">

<div class="topbar">

<h1>
Düğün Yönetim Paneli
</h1>

<button
class="logout-btn"
onclick="logout()">
Çıkış
</button>

</div>

<div class="stats">

<div class="card">
<h2>Toplam Katılım</h2>
<span id="totalCount">0</span>
</div>

<div class="card">
<h2>Gelecek Kişi</h2>
<span id="yesCount">0</span>
</div>

<div class="card">
<h2>Gelmeyecek</h2>
<span id="noCount">0</span>
</div>

<div class="card">
<h2>Kararsız</h2>
<span id="maybeCount">0</span>
</div>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>İsim</th>
<th>Telefon</th>
<th>Kişi Sayısı</th>
<th>Durum</th>
<th>Not</th>
</tr>
</thead>

<tbody id="guestTable">
</tbody>

</table>

</div>

<button
class="export-btn"
onclick="exportData()">

Excel Olarak İndir

</button>

</div>

<script>

const ADMIN_PASSWORD =
"gy2026panel";

function login(){

const pass =
document.getElementById("password").value;

if(pass === ADMIN_PASSWORD){

localStorage.setItem(
"adminAuth",
"true"
);

document.getElementById(
"loginScreen"
).style.display = "none";

document.getElementById(
"adminPanel"
).style.display = "block";

}else{

alert("Şifre yanlış");

}

}

function logout(){

localStorage.removeItem(
"adminAuth"
);

location.reload();

}

if(
localStorage.getItem("adminAuth")
=== "true"
){

document.getElementById(
"loginScreen"
).style.display = "none";

document.getElementById(
"adminPanel"
).style.display = "block";

}

function exportData(){

alert(
"Excel sistemi sonraki adımda bağlanacak 😄"
);

}

</script>

</body>
</html>
