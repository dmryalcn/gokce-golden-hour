<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gökçe & Yalçın</title>

  <meta name="theme-color" content="#4b3527">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta property="og:title" content="Gökçe & Yalçın">
  <meta property="og:description" content="26 Haziran 2026 • Nişan Davetiyesi">
  <meta property="og:image" content="https://gokceyalcin.net/cover.jpg">
  <meta property="og:url" content="https://gokceyalcin.net">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/png" href="favicon.png">

  <script async src="https://tally.so/widgets/embed.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#f7efe5;
      background-attachment:fixed;
      color:#4b3527;
      overflow-x:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    ::selection{
      background:#b0824f;
      color:white;
    }

    img{
      -webkit-user-drag:none;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
      background:
        radial-gradient(circle at 20% 20%, rgba(246,216,168,.25), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,.18), transparent 22%),
        radial-gradient(circle at 50% 90%, rgba(184,130,63,.18), transparent 28%);
    }

    body.night::before{
      background:
        radial-gradient(circle at 20% 20%, rgba(246,216,168,.18), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(120,70,35,.12), transparent 22%),
        radial-gradient(circle at 50% 90%, rgba(75,53,39,.18), transparent 28%);
    }

    .gold-dust{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:2;
      overflow:hidden;
    }

    .gold-dust span{
      position:absolute;
      width:5px;
      height:5px;
      border-radius:50%;
      background:rgba(255,218,150,.75);
      box-shadow:0 0 12px rgba(255,218,150,.9);
      animation:floatDust linear infinite;
    }

    @keyframes floatDust{
      from{transform:translateY(110vh) scale(.6);opacity:0}
      20%{opacity:1}
      80%{opacity:1}
      to{transform:translateY(-10vh) scale(1.2);opacity:0}
    }

    #intro{
      position:fixed;
      inset:0;
      z-index:99999;
      background:
        radial-gradient(circle at top,#f6d8a8,transparent 35%),
        linear-gradient(135deg,#3a2418,#8f6237,#f1c27d);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:white;
      padding:25px;
      transition:opacity 1s ease, visibility 1s ease;
    }

    #intro::after{
      content:"";
      position:absolute;
      inset:-40%;
      background:linear-gradient(120deg, transparent 35%, rgba(255,255,255,.18), transparent 65%);
      animation:shimmer 4s infinite;
      pointer-events:none;
    }

    @keyframes shimmer{
      from{transform:translateX(-40%)}
      to{transform:translateX(40%)}
    }

    #intro.hide{
      opacity:0;
      visibility:hidden;
    }

    .seal-card{
      position:relative;
      z-index:2;
      max-width:520px;
      width:100%;
      padding:45px 30px;
      border-radius:35px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.25);
      backdrop-filter:blur(10px);
      box-shadow:0 20px 60px rgba(0,0,0,.25);
    }

    .seal{
      width:95px;
      height:95px;
      margin:0 auto 25px;
      border-radius:50%;
      background:#7b1f1f;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Cormorant Garamond',serif;
      font-size:36px;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
      border:3px solid rgba(255,255,255,.35);
      animation:sealGlow 2.8s ease-in-out infinite;
    }

    @keyframes sealGlow{
      0%,100%{box-shadow:0 10px 25px rgba(0,0,0,.25)}
      50%{box-shadow:0 0 35px rgba(255,235,190,.65)}
    }

    .seal-card h2{
      font-family:'Cormorant Garamond',serif;
      font-size:52px;
      margin-bottom:15px;
    }

    .seal-card p{
      line-height:1.8;
      opacity:.92;
      margin-bottom:28px;
    }

    .open-btn{
      border:none;
      border-radius:999px;
      padding:15px 32px;
      background:white;
      color:#4b3527;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
      transition:.3s;
    }

    .open-btn:hover{
      transform:translateY(-3px) scale(1.02)
    }

    .music-toggle{
      position:fixed;
      top:20px;
      right:20px;
      z-index:9999;
      width:50px;
      height:50px;
      border-radius:50%;
      border:none;
      background:rgba(75,53,39,.82);
      backdrop-filter:blur(10px);
      color:white;
      cursor:pointer;
      font-size:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 25px rgba(0,0,0,.2);
    }

    .hero{
      position:relative;
      z-index:3;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px;
      background:
      linear-gradient(rgba(0,0,0,.32),rgba(0,0,0,.32)),
      url('hero.webp');
      background-size:cover;
      background-position:center;
      color:white;
      animation:heroZoom 18s ease-in-out infinite alternate;
    }

    @keyframes heroZoom{
      from{background-size:100%}
      to{background-size:108%}
    }

    .hero-content{
      backdrop-filter:blur(7px);
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.18);
      padding:50px;
      border-radius:34px;
      max-width:880px;
      animation:fadeUp 1.2s ease both;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(25px)}
      to{opacity:1;transform:translateY(0)}
    }

    .tag{
      letter-spacing:4px;
      text-transform:uppercase;
      font-size:12px;
      opacity:.9;
    }

    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:90px;
      font-weight:600;
      margin-top:20px;
    }

    .desc{
      margin-top:20px;
      font-size:18px;
      line-height:1.8;
      opacity:.92;
    }

    .quote{
      margin-top:18px;
      font-family:'Cormorant Garamond',serif;
      font-size:28px;
      opacity:.95;
    }

    .music-note{
      margin-top:18px;
      font-size:13px;
      opacity:.78;
      color:rgba(255,255,255,.9);
    }

    .buttons{
      margin-top:35px;
      display:flex;
      gap:15px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      padding:15px 28px;
      border-radius:999px;
      text-decoration:none;
      transition:.3s;
      font-weight:500;
      border:none;
      cursor:pointer;
      font-size:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn-dark{background:#4b3527;color:white}

    .btn-light{
      background:rgba(255,255,255,.15);
      color:white;
      border:1px solid rgba(255,255,255,.25);
      backdrop-filter:blur(5px);
    }

    .btn:hover{transform:translateY(-3px)}
    .btn:active{transform:scale(.97)}

    section{
      position:relative;
      z-index:3;
      padding:95px 25px;
    }

    .container{
      max-width:1100px;
      margin:auto
    }

    .reveal{
      opacity:0;
      transform:translateY(60px);
      filter:blur(10px);
      transition:all 1.2s ease;
    }

    .reveal.active{
      opacity:1;
      transform:translateY(0);
      filter:blur(0);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.55);
      padding:35px;
      border-radius:30px;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
      text-align:center;
      transition:.35s;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 18px 45px rgba(0,0,0,.09);
    }

    .icon{
      width:50px;
      height:50px;
      margin:0 auto 15px;
      border-radius:50%;
      background:#f4e4cf;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      color:#8f6237;
    }

    .card h3{
      font-family:'Cormorant Garamond',serif;
      font-size:34px;
      margin-bottom:10px;
    }

    .card p{
      line-height:1.8;
    }

    .section-title{
      text-align:center;
      margin-bottom:55px;
    }

    .section-title p{
      letter-spacing:4px;
      text-transform:uppercase;
      color:#b0824f;
      font-size:12px;
    }

    .section-title h2{
      font-family:'Cormorant Garamond',serif;
      font-size:58px;
      margin-top:15px;
    }

    .gold-line{
      width:90px;
      height:1px;
      background:linear-gradient(to right, transparent, #c69a63, transparent);
      margin:22px auto 0;
    }

    .countdown{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
      gap:18px;
      max-width:800px;
      margin:0 auto;
    }

    .time-box{
      background:rgba(255,255,255,.22);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.35);
      border-radius:28px;
      padding:28px 15px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
    }

    .time-box strong{
      display:block;
      font-family:'Cormorant Garamond',serif;
      font-size:52px;
      color:#4b3527;
    }

    .time-box span{
      letter-spacing:3px;
      text-transform:uppercase;
      font-size:12px;
      color:#9a7659;
    }

    .event-day-message{
      margin-top:35px;
      text-align:center;
      font-family:'Cormorant Garamond',serif;
      font-size:34px;
      color:#4b3527;
      display:none;
    }

    .event-day-message.show{
      display:block;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .gallery img{
      width:100%;
      height:400px;
      object-fit:cover;
      border-radius:28px;
      box-shadow:0 12px 30px rgba(0,0,0,.08);
      transition:.4s;
    }

    .gallery img:hover{
      transform:scale(1.03);
      filter:brightness(1.08);
      box-shadow:0 20px 45px rgba(184,130,63,.28);
    }

    .action-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .map-card{
      max-width:900px;
      margin:0 auto;
      text-align:center;
    }

    .map-card .address{
      font-size:18px;
      line-height:1.9;
      margin:18px auto 25px;
      max-width:650px;
    }

    .final-section{
      text-align:center;
      background:linear-gradient(135deg,#4b3527,#8f6237);
      color:white;
      padding:85px 25px;
      border-radius:40px;
      max-width:1100px;
      margin:0 auto;
      box-shadow:0 20px 60px rgba(0,0,0,.18);
    }

    .final-section h2{
      font-family:'Cormorant Garamond',serif;
      font-size:56px;
      margin-bottom:20px;
    }

    .final-section p{
      max-width:700px;
      margin:0 auto;
      line-height:2;
      opacity:.9;
      font-size:18px;
    }

    .memory-note{
      text-align:center;
      max-width:760px;
      margin:0 auto;
      font-family:'Cormorant Garamond',serif;
      font-size:34px;
      line-height:1.5;
      color:#4b3527;
    }

    .floating-memory{
      position:fixed;
      right:20px;
      bottom:20px;
      z-index:9999;
      background:#4b3527;
      color:white;
      border:none;
      border-radius:999px;
      padding:15px 22px;
      font-size:15px;
      cursor:pointer;
      box-shadow:0 10px 30px rgba(0,0,0,.22);
      animation:pulseGlow 2.2s infinite;
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.15);
    }

    @keyframes pulseGlow{
      0%,100%{box-shadow:0 10px 30px rgba(0,0,0,.22)}
      50%{box-shadow:0 0 25px rgba(184,130,63,.75)}
    }

    footer{
      position:relative;
      z-index:3;
      text-align:center;
      padding:50px 20px;
      color:#7c6250;
    }

    @media(max-width:768px){
      .hero{animation:none;background-size:cover}
      h1{font-size:58px}
      .hero-content{padding:35px 25px}
      .section-title h2{font-size:42px}
      .seal-card h2{font-size:42px}
      .final-section h2{font-size:40px}
      .quote{font-size:24px}
      .memory-note{font-size:28px}
      .floating-memory{right:14px;bottom:14px;padding:13px 18px}
    }
  </style>
</head>

<body>

  <div class="gold-dust" id="goldDust"></div>

  <button class="music-toggle" onclick="toggleMusic()">
    🔊
  </button>

  <div id="intro">
    <div class="seal-card">
      <div class="seal">G&Y</div>

      <h2>Gökçe & Yalçın</h2>

      <p>
        Bu özel günümüzün dijital davetiyesini açmak için mührü dokunarak açın.
      </p>

      <button class="open-btn" onclick="openInvitation()">
        Daveti Aç 🤍
      </button>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="Gözlerin (Yedi Karanfil) - Esen Müzik [8t-S9Hf-f4U] (1).mp3" type="audio/mpeg">
  </audio>

  <!-- DEVAMI SENİN KODUNDAKİ GİBİ AYNI -->
</body>
</html>
